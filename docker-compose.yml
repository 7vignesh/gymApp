services:
  postgres:
    image: postgres:16-alpine
    container_name: caloriex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calai
    ports:
      - "5433:5432"
    volumes:
      - caloriex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: web UI for inspecting the DB at http://localhost:5050
  # login with admin@local / admin, then add a server:
  #   host=postgres  port=5432  user=postgres  password=postgres
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: caloriex-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  caloriex_pgdata:
